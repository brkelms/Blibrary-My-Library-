        let currentLang = localStorage.getItem('lang') || 'tr';
        let booksData = [];

        function applyLanguage(lang) {
            document.documentElement.lang = lang;
            document.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });

            document.getElementById('optCountryAdd').textContent = i18n[lang].optCountry;
            document.getElementById('optCountryEdit').textContent = i18n[lang].optCountry;
            document.getElementById('optLangAdd').textContent = i18n[lang].optLang;
            document.getElementById('optLangEdit').textContent = i18n[lang].optLang;

            if(booksData.length === 0) {
                document.getElementById('optSelectBook').textContent = i18n[lang].waitData;
            } else {
                document.getElementById('optSelectBook').textContent = i18n[lang].optSelectBook;
            }

            document.querySelectorAll('.fmtPrint').forEach(el => el.textContent = i18n[lang].fmtPrint);
            document.querySelectorAll('.fmtEbook').forEach(el => el.textContent = i18n[lang].fmtEbook);
            document.querySelectorAll('.fmtAudio').forEach(el => el.textContent = i18n[lang].fmtAudio);
            document.querySelectorAll('.fmtUnknown').forEach(el => el.textContent = i18n[lang].fmtUnknown);

            const flags = { 'tr': 'tr', 'en': 'gb', 'de': 'de', 'fr': 'fr', 'ar': 'sa', 'ru': 'ru', 'zh': 'cn', 'ko': 'kr' };
            document.getElementById('currentLangFlag').src = `https://flagcdn.com/24x18/${flags[lang]}.png`;
            updateBookCountUI();
        }

        document.querySelectorAll('.lang-select').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault(); currentLang = e.currentTarget.getAttribute('data-lang');
                localStorage.setItem('lang', currentLang); applyLanguage(currentLang);
            });
        });

        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        function updateIcon() { themeIcon.className = document.documentElement.getAttribute('data-theme') === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill'; }
        updateIcon();
        themeToggleBtn.addEventListener('click', () => {
            let newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme); localStorage.setItem('theme', newTheme); updateIcon();
        });

        const languages = ["Afrikanca", "Almanca", "Amharca", "Arapça", "Arnavutça", "Assamca", "Aymaraca", "Azerbaycan Türkçesi", "Baskça", "Başkurtça", "Belarusça", "Bengalce", "Birmanca", "Boşnakça", "Bretonca", "Bulgarca", "Cava Dili", "Çeçence", "Çekçe", "Çince", "Danca", "Dari", "Endonezce", "Ermenice", "Esperanto", "Estonca", "Farsça", "Felemenkçe", "Fince", "Fransızca", "Frizce", "Galce", "Galiçyaca", "Güceratça", "Gürcüce", "Haiti Kreyolu", "Hausa", "Hawaiice", "Hırvatça", "Hintçe", "Hmong", "İbranice", "İgbo", "İngilizce", "İrlandaca", "İskoçça", "İspanyolca", "İsveççe", "İtalyanca", "İzlandaca", "Japonca", "Kamboçyaca", "Kannada", "Katalanca", "Kazakça", "Kırgızca", "Korece", "Korsikaca", "Kürtçe", "Laoca", "Latince", "Lehçe", "Letonca", "Litvanca", "Lüksemburgca", "Macarca", "Makedonca", "Malayca", "Malayalam", "Maltaca", "Maorice", "Marathi", "Moğolca", "Nepalce", "Norveççe", "Osetçe", "Özbekçe", "Pencapça", "Peştuca", "Portekizce", "Romence", "Rusça", "Samoaca", "Sanskritçe", "Sırpça", "Sintçe", "Slovakça", "Slovence", "Somalice", "Sundaca", "Svahili", "Tacikçe", "Tamilce", "Tatarca", "Tayca", "Teluguca", "Tibetçe", "Türkçe", "Türkmence", "Ukraynaca", "Urduca", "Uygurca", "Vietnamca", "Yidiş", "Yoruba", "Yunanca", "Zuluca", "Sümerce"];

        function populateDropdowns() {
            countries.sort((a, b) => a.localeCompare(b, 'tr'));
            languages.sort((a, b) => a.localeCompare(b, 'tr'));
            const cAdd = document.getElementById('countryAdd'), cEdit = document.getElementById('countryEdit');
            countries.forEach(c => { cAdd.add(new Option(c, c)); cEdit.add(new Option(c, c)); });
            const lAdd = document.getElementById('languageAdd'), lEdit = document.getElementById('languageEdit');
            languages.forEach(l => { lAdd.add(new Option(l, l)); lEdit.add(new Option(l, l)); });
        }

        // ==========================================
        // SUPABASE VERİ İŞLEMLERİ
        // ==========================================
        async function fetchBooksFromSupabase() {
            const { data, error } = await supabaseClient.from('kitaplar').select('*');
            if (error) { console.error(error); return; }
            booksData = data;
            populateEditSelect();
            updateBookCountUI();
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateDropdowns(); 
            applyLanguage(currentLang);
            fetchBooksFromSupabase(); 
        });

        function populateEditSelect() {
            const select = document.getElementById('editSelect');
            select.innerHTML = `<option value="" id="optSelectBook">${i18n[currentLang].optSelectBook}</option>`;
            [...booksData].sort((a,b) => a.title.localeCompare(b.title)).forEach(book => select.appendChild(new Option(`${book.title} - ${book.author}`, book.id)));
            document.getElementById('editBookForm').style.display = 'none';
        }

        function updateBookCountUI() { 
            if(booksData.length > 0) {
                document.getElementById('bookCountText').innerText = i18n[currentLang].msgCount.replace('X', booksData.length);
            }
        }

        document.getElementById('editSelect').addEventListener('change', function() {
            const form = document.getElementById('editBookForm');
            if (this.value) {
                const book = booksData.find(b => b.id == this.value);
                if (book) {
                    document.getElementById('bookIdEdit').value = book.id; 
                    document.getElementById('titleEdit').value = book.title; 
                    document.getElementById('authorEdit').value = book.author;
                    const cSelect = document.getElementById('countryEdit'), lSelect = document.getElementById('languageEdit');
                    if(![...cSelect.options].map(o => o.value).includes(book.country)) cSelect.add(new Option(book.country, book.country));
                    if(![...lSelect.options].map(o => o.value).includes(book.originallanguage)) lSelect.add(new Option(book.originallanguage, book.originallanguage));
                    cSelect.value = book.country; lSelect.value = book.originallanguage;
                    document.getElementById('pagesEdit').value = book.pages; 
                    document.getElementById('yearReadEdit').value = book.yearread; 
                    document.getElementById('formatEdit').value = book.format; 
                    
                    let numericRating = parseInt(parseFloat((book.rating || "0").replace(',', '.')));
                    document.getElementById('ratingEdit').value = numericRating; 
                    document.getElementById('ratingValueEdit').innerText = book.rating; 
                    document.getElementById('reviewEdit').value = book.review;
                    form.style.display = 'block'; 
                }
            } else { form.style.display = 'none'; }
        });

        // KİTAP EKLEME
        document.getElementById('addBookForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnAddSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> ${i18n[currentLang].msgWait}`;
            btn.disabled = true;

            const newBook = {
                title: document.getElementById('titleAdd').value.trim(), author: document.getElementById('authorAdd').value.trim(),
                originallanguage: document.getElementById('languageAdd').value, country: document.getElementById('countryAdd').value,
                pages: parseInt(document.getElementById('pagesAdd').value), yearread: parseInt(document.getElementById('yearReadAdd').value),
                format: document.getElementById('formatAdd').value, rating: document.getElementById('ratingAdd').value.toString(),
                review: document.getElementById('reviewAdd').value.trim()
            };

            const { error } = await supabaseClient.from('kitaplar').insert([newBook]);
            btn.innerHTML = originalText; btn.disabled = false;

            if (error) { showAlert("Hata: " + error.message, "alert-danger"); } 
            else { this.reset(); document.getElementById('ratingValueAdd').innerText = "8"; showAlert(i18n[currentLang].msgAdd, "alert-success"); fetchBooksFromSupabase(); }
        });

        // KİTAP GÜNCELLEME
        document.getElementById('editBookForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('bookIdEdit').value;
            const btn = document.getElementById('btnUpdateSubmit');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> ${i18n[currentLang].msgWait}`;
            btn.disabled = true;

            const updatedBook = {
                title: document.getElementById('titleEdit').value.trim(), author: document.getElementById('authorEdit').value.trim(),
                originallanguage: document.getElementById('languageEdit').value, country: document.getElementById('countryEdit').value,
                pages: parseInt(document.getElementById('pagesEdit').value), yearread: parseInt(document.getElementById('yearReadEdit').value),
                format: document.getElementById('formatEdit').value, rating: document.getElementById('ratingEdit').value.toString(),
                review: document.getElementById('reviewEdit').value.trim()
            };

            const { error } = await supabaseClient.from('kitaplar').update(updatedBook).eq('id', id);
            btn.innerHTML = originalText; btn.disabled = false;

            if(error) { showAlert("Hata: " + error.message, "alert-danger"); } 
            else { showAlert(i18n[currentLang].msgUpdate, "alert-warning"); fetchBooksFromSupabase(); }
        });

        // KİTAP SİLME
        document.getElementById('btnDelete').addEventListener('click', async function() {
            const id = document.getElementById('bookIdEdit').value;
            if (id && confirm('Silmek istediğinize emin misiniz? / Are you sure?')) {
                const { error } = await supabaseClient.from('kitaplar').delete().eq('id', id);
                if(error) { showAlert("Hata: " + error.message, "alert-danger"); } 
                else { showAlert(i18n[currentLang].msgDelete, "alert-danger"); fetchBooksFromSupabase(); }
            }
        });

        // YENİ SAYFA ALTI BİLDİRİM FONKSİYONU (TOAST)
        function showAlert(msg, cls) {
            const box = document.getElementById('toastAlert');
            box.className = `alert ${cls} position-fixed bottom-0 end-0 m-4 shadow-lg px-4 py-3 border-0`; 
            
            let icon = 'bi-info-circle-fill';
            if(cls.includes('danger')) icon = 'bi-exclamation-triangle-fill';
            else if(cls.includes('success')) icon = 'bi-check-circle-fill';

            box.innerHTML = `<i class="bi ${icon} me-2 fs-5 align-middle"></i> <span class="align-middle fw-medium">${msg}</span>`;
            box.classList.remove('d-none');
            
            setTimeout(() => { box.classList.add('d-none'); }, 3000);
        }
    </script>
